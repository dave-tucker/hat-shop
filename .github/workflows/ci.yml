name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ovn-kubernetes/hat-shop

jobs:
  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - pkg
          - services/catalogue
          - services/orders
          - services/carts
          - services/payments
          - services/shipping
          - services/user
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./...
          working-directory: ${{ matrix.module }}

  lint-ts:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/front-end/package-lock.json
      - run: npm ci
        working-directory: services/front-end
      - run: npm run lint && npm run type-check
        working-directory: services/front-end

  test-go:
    name: Test (Go) — ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - pkg
          - services/catalogue
          - services/orders
          - services/carts
          - services/payments
          - services/shipping
          - services/user
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Test ${{ matrix.module }}
        run: go test ./...
        working-directory: ${{ matrix.module }}

  validate-manifests:
    name: Validate Kustomize manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Validate base
        run: kubectl kustomize deploy/kubernetes/base > /dev/null
      - name: Validate cluster-a overlay
        run: kubectl kustomize deploy/kubernetes/overlays/cluster-a > /dev/null
      - name: Validate cluster-b overlay
        run: kubectl kustomize deploy/kubernetes/overlays/cluster-b > /dev/null
      - name: Validate local overlay
        run: kubectl kustomize deploy/kubernetes/overlays/local > /dev/null

  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint-go, lint-ts, test-go, validate-manifests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - catalogue
          - orders
          - carts
          - payments
          - shipping
          - user
          - front-end
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          build-args: |
            CLUSTER_NAME=ci
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
