# Headless service — gives each pod a stable DNS entry within the cluster:
#   cockroachdb-0.<subdomain>.hat-shop.svc.cluster.local
# The subdomain field on each pod (patched per overlay) controls the
# <subdomain> component. Plexus exposes this cross-cluster as:
#   cockroachdb-0.<subdomain>.hat-shop.svc.clusterset.local
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb
  namespace: hat-shop
  labels:
    app: cockroachdb
spec:
  clusterIP: None
  selector:
    app: cockroachdb
  ports:
    - port: 26257
      targetPort: grpc
      name: grpc
    - port: 8080
      targetPort: http
      name: http
---
# Public service — used by application services to reach CockroachDB via
# standard pgx connection string within the same cluster.
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb-public
  namespace: hat-shop
  labels:
    app: cockroachdb
spec:
  selector:
    app: cockroachdb
  ports:
    - port: 26257
      targetPort: grpc
      name: grpc
    - port: 8080
      targetPort: http
      name: http
