apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: hat-shop
  labels:
    app: kafka
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - port: 9092
      name: client
    - port: 9093
      name: controller
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-bootstrap
  namespace: hat-shop
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: client
      name: client
