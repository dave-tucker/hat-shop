apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - config.yaml
  # Infrastructure services (StatefulSets are NOT listed here — they are
  # added per-overlay so each overlay can provide the right kind:
  # StatefulSet for cluster-a/cluster-b, Deployment for local/podman)
  - cockroachdb/service.yaml
  - kafka/service.yaml
  # Application services
  - catalogue/deployment.yaml
  - catalogue/service.yaml
  - orders/deployment.yaml
  - orders/service.yaml
  - carts/deployment.yaml
  - carts/service.yaml
  - payments/deployment.yaml
  - payments/service.yaml
  - shipping/deployment.yaml
  - shipping/service.yaml
  - user/deployment.yaml
  - user/service.yaml
  - front-end/deployment.yaml
  - front-end/service.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: hat-shop
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
