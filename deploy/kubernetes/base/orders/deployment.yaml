apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: hat-shop
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: ghcr.io/ovn-kubernetes/hat-shop/orders:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: cluster-config
            - secretRef:
                name: hat-shop-secrets
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
