# Run `cockroach init` once after the StatefulSet is up on the FIRST cluster
# only. Subsequent clusters join the existing cluster via --join; no init needed.
# Deploy this Job manually on cluster-a after the StatefulSet is Ready:
#   kubectl apply -f deploy/kubernetes/base/cockroachdb/init-job.yaml -n hat-shop
#
# It is intentionally excluded from the Kustomize base (not listed in
# kustomization.yaml) to avoid accidental re-init on cluster-b.
apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-init
  namespace: hat-shop
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cockroachdb-init
          image: cockroachdb/cockroach:v24.1.3
          command:
            - /cockroach/cockroach
            - init
            - --insecure
            - --host=cockroachdb-public.hat-shop.svc.cluster.local:26257
