apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cockroachdb
  namespace: hat-shop
spec:
  serviceName: cockroachdb
  # 2 replicas per cluster. The --join list (patched per overlay) ties
  # together nodes across clusters into one global CockroachDB cluster.
  replicas: 2
  selector:
    matchLabels:
      app: cockroachdb
  template:
    metadata:
      labels:
        app: cockroachdb
    spec:
      # Each pod needs a unique hostname so Plexus DNS can resolve it
      # cross-cluster as <hostname>.<subdomain>.<cudn>.svc.clusterset.local.
      # subdomain is set to a cluster-specific value in each overlay.
      terminationGracePeriodSeconds: 60
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.1.3
          ports:
            - containerPort: 26257
              name: grpc
            - containerPort: 8080
              name: http
          command:
            - /cockroach/cockroach
            - start
            - --insecure
            - --advertise-host=$(POD_NAME).$(CRDB_SUBDOMAIN).hat-shop.svc.cluster.local
            - --http-addr=0.0.0.0:8080
            - --listen-addr=0.0.0.0:26257
            - --cache=256MiB
            - --max-sql-memory=256MiB
            - --cluster-name=hat-shop
            # --join is patched by each cluster overlay to include both
            # local pod FQDNs and remote cluster pod FQDNs via clusterset.local.
            - --join=PATCHED_BY_OVERLAY
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CRDB_SUBDOMAIN
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: crdb_subdomain
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
