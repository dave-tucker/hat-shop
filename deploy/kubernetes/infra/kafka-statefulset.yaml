apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: hat-shop
spec:
  serviceName: kafka
  # 2 brokers per cluster. Subdomain is patched per overlay so each cluster's
  # brokers are addressable cross-cluster via Plexus clusterset.local DNS.
  replicas: 2
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 9093
              name: controller
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_SUBDOMAIN
              valueFrom:
                configMapKeyRef:
                  name: cluster-config
                  key: kafka_subdomain
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://$(POD_NAME).$(KAFKA_SUBDOMAIN).hat-shop.svc.cluster.local:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            # PATCHED_BY_OVERLAY — each overlay sets the full quorum voter list
            # including pods from remote clusters via clusterset.local FQDNs.
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: PATCHED_BY_OVERLAY
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
          volumeMounts:
            - name: datadir
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 20
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
