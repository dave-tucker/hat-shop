# Converts the CockroachDB StatefulSet to a single-node Deployment for local
# development with `podman kube play`. No persistent volume, no join list.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockroachdb
  namespace: hat-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cockroachdb
  template:
    metadata:
      labels:
        app: cockroachdb
    spec:
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.1.3
          command:
            - /cockroach/cockroach
            - start-single-node
            - --insecure
            - --http-addr=0.0.0.0:8080
            - --listen-addr=0.0.0.0:26257
          ports:
            - containerPort: 26257
              name: grpc
            - containerPort: 8080
              name: http
