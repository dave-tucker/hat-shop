apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - crdb-deployment.yaml
  - kafka-deployment.yaml

patches:
  - path: cluster-config-patch.yaml
  - path: frontend-env-patch.yaml
  # imagePullPolicy: Never on every Deployment — use local podman image cache
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: catalogue
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: orders
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: carts
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: payments
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: shipping
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: user
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: front-end
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: cockroachdb
  - path: pull-policy-patch.yaml
    target:
      kind: Deployment
      name: kafka
